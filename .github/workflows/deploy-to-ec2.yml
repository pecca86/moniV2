name: Deploy to EC2 K3s Cluster

on:
  workflow_run:
    workflows: ["Build and Push Docker Images to ECR"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 026596707189.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY_BACKEND: moni/moni-be
  ECR_REPOSITORY_FRONTEND: moni/moni-fe

jobs:
  deploy-to-ec2:
    name: Deploy BE/FE to EC2 K3s (Preserve DB)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Get EC2 Instance IP and ID
      id: get-instance
      run: |
        INSTANCE_IP=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=moni-dev-k3s" "Name=instance-state-name,Values=running" \
          --query "Reservations[0].Instances[0].PublicIpAddress" \
          --output text)
        INSTANCE_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=moni-dev-k3s" "Name=instance-state-name,Values=running" \
          --query "Reservations[0].Instances[0].InstanceId" \
          --output text)
        echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
        echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
        echo "Found instance $INSTANCE_ID at $INSTANCE_IP"

    - name: Deploy to K3s via SSM
      env:
        INSTANCE_ID: ${{ steps.get-instance.outputs.instance_id }}
        BE_IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        FE_IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
      run: |
        # Encode manifests to pass to instance
        MANIFEST_B64=$(base64 -w 0 k8s-dev/manifests/moni-app.yaml)

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters commands="[
            \"export KUBECONFIG=/etc/rancher/k3s/k3s.yaml\",
            \"echo 'Step 1: Refreshing ECR pull secret...'\",
            \"ECR_TOKEN=\$(aws ecr get-login-password --region $AWS_REGION)\",
            \"kubectl create secret docker-registry ecr-pull-secret --docker-server=$ECR_REGISTRY --docker-username=AWS --docker-password=\$ECR_TOKEN -n moni --dry-run=client -o yaml | kubectl apply -f -\",
            \"echo 'Step 2: Applying manifests...'\",
            \"echo '$MANIFEST_B64' | base64 -d | kubectl apply -f -\",
            \"echo 'Step 3: Deploying backend image $BE_IMAGE'\",
            \"kubectl set image deployment/moni-be moni-be=$BE_IMAGE -n moni\",
            \"echo 'Step 4: Deploying frontend image $FE_IMAGE'\",
            \"kubectl set image deployment/moni-fe moni-fe=$FE_IMAGE -n moni\",
            \"echo 'Step 5: Waiting for rollouts...'\",
            \"kubectl rollout status deployment/moni-be -n moni --timeout=300s\",
            \"kubectl rollout status deployment/moni-fe -n moni --timeout=300s\",
            \"echo 'Step 6: Final status'\",
            \"kubectl get pods -n moni\"
          ]" \
          --timeout-seconds 600 \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "[StandardOutputContent, StandardErrorContent]" \
          --output text

    - name: Verify Deployment
      env:
        EC2_IP: ${{ steps.get-instance.outputs.instance_ip }}
      run: |
        sleep 10
        HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:30080/actuator/health || echo "000")
        if [ "$HEALTH_STATUS" = "200" ]; then
          echo "Backend is healthy (HTTP 200)"
        else
          echo "Backend health check returned: $HEALTH_STATUS (may still be starting)"
        fi

        FE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:30081/ || echo "000")
        if [ "$FE_STATUS" = "200" ]; then
          echo "Frontend is healthy (HTTP 200)"
        else
          echo "Frontend health check returned: $FE_STATUS"
        fi

    - name: Create Deployment Summary
      env:
        EC2_IP: ${{ steps.get-instance.outputs.instance_ip }}
      run: |
        echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | \`$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | \`$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Database | PostgreSQL 16 (data preserved) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Frontend:** http://$EC2_IP:30081" >> $GITHUB_STEP_SUMMARY
        echo "**Backend:** http://$EC2_IP:30080" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
